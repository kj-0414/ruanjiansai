openapi: 3.0.0
info:
  title: 人才职位智能匹配与能力图谱系统 API
  version: 1.0.0
  description: 基于AI的人才职位智能匹配与能力图谱系统API接口文档

servers:
  - url: http://localhost:8000
    description: 本地开发服务器

paths:
  /api/user/send-code:
    post:
      summary: 发送验证码
      description: 向指定手机号发送验证码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 手机号（11位）
      responses:
        '200':
          description: 发送成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  code:
                    type: string
        '400':
          description: 请求参数错误

  /api/user/register:
    post:
      summary: 用户注册
      description: 手机号验证码注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 手机号
                code:
                  type: string
                  description: 验证码
                password:
                  type: string
                  description: 密码
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user_id:
                    type: string
        '400':
          description: 参数错误或验证码无效

  /api/user/login:
    post:
      summary: 用户登录
      description: 手机号密码登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 手机号
                password:
                  type: string
                  description: 密码
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: JWT访问令牌
                  token_type:
                    type: string
                    description: 令牌类型
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      phone:
                        type: string
                      role:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
        '401':
          description: 认证失败

  /api/user/me:
    get:
      summary: 获取当前用户信息
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  phone:
                    type: string
                  role:
                    type: string
                  roles:
                    type: array
                    items:
                      type: string
        '401':
          description: 未授权

  /api/user/logout:
    post:
      summary: 用户登出
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/resume/upload:
    post:
      summary: 上传简历
      description: 上传简历文件并创建简历记录
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                resume_name:
                  type: string
                  description: 简历名称
                file:
                  type: string
                  format: binary
                  description: 简历文件（PDF/DOCX）
                name:
                  type: string
                  description: 姓名
                phone:
                  type: string
                  description: 手机号
                email:
                  type: string
                  description: 邮箱
                desired_position:
                  type: string
                  description: 期望职位
                education:
                  type: string
                  description: 学历
                school:
                  type: string
                  description: 学校
                major:
                  type: string
                  description: 专业
                degree:
                  type: string
                  description: 学位
                experience:
                  type: string
                  description: 工作经验
                skills:
                  type: string
                  description: 技能（JSON数组）
                work_years:
                  type: integer
                  description: 工作年限
      responses:
        '200':
          description: 上传成功
        '400':
          description: 文件类型错误或大小超限

  /api/resume:
    get:
      summary: 获取简历列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    resume_name:
                      type: string
                    file_path:
                      type: string
                    created_at:
                      type: string
                      format: date-time

  /api/resume/all:
    get:
      summary: 获取所有简历（企业端）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功

  /api/resume/{resume_id}:
    get:
      summary: 获取简历详情
      security:
        - bearerAuth: []
      parameters:
        - name: resume_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 获取成功
        '404':
          description: 简历不存在

    put:
      summary: 更新简历
      security:
        - bearerAuth: []
      parameters:
        - name: resume_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resume_name:
                  type: string
                name:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                desired_position:
                  type: string
                education:
                  type: string
                school:
                  type: string
                major:
                  type: string
                degree:
                  type: string
                experience:
                  type: string
                skills:
                  type: array
                  items:
                    type: string
                work_experience:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: 更新成功
        '404':
          description: 简历不存在

    delete:
      summary: 删除简历
      security:
        - bearerAuth: []
      parameters:
        - name: resume_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
        '404':
          description: 简历不存在

  /api/resume/extract-resume:
    post:
      summary: 解析简历信息
      description: 通过AI解析上传的简历文件
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: 解析成功

  /api/job:
    post:
      summary: 创建岗位
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                job_name:
                  type: string
                  description: 岗位名称
                company_name:
                  type: string
                  description: 公司名称
                company_size:
                  type: string
                  description: 公司规模
                company_industry:
                  type: string
                  description: 所属行业
                company_intro:
                  type: string
                  description: 公司介绍
                location:
                  type: string
                  description: 工作地点
                education:
                  type: string
                  description: 学历要求
                experience:
                  type: string
                  description: 经验要求
                salary_min:
                  type: integer
                  description: 最低薪资
                salary_max:
                  type: integer
                  description: 最高薪资
                job_desc:
                  type: string
                  description: 岗位职责
                requirements:
                  type: string
                  description: 任职要求
                skills:
                  type: array
                  items:
                    type: string
                  description: 技能要求
      responses:
        '200':
          description: 创建成功

    get:
      summary: 获取岗位列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功

  /api/job/{job_id}:
    get:
      summary: 获取岗位详情
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 获取成功
        '404':
          description: 岗位不存在

    put:
      summary: 更新岗位
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                job_name:
                  type: string
                location:
                  type: string
                education:
                  type: string
                experience:
                  type: string
                salary_min:
                  type: integer
                salary_max:
                  type: integer
                job_desc:
                  type: string
                requirements:
                  type: string
      responses:
        '200':
          description: 更新成功
        '404':
          description: 岗位不存在

    delete:
      summary: 删除岗位
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
        '404':
          description: 岗位不存在

  /api/job/upload:
    post:
      summary: 上传岗位要求文件
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                job_name:
                  type: string
                company_name:
                  type: string
                company_size:
                  type: string
                company_industry:
                  type: string
                company_intro:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 上传成功

  /api/job/extract-job:
    post:
      summary: 解析岗位信息
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: 解析成功

  /api/job/ability/create:
    post:
      summary: 创建岗位能力图谱
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                job_id:
                  type: integer
                  description: 岗位ID
                abilities:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      weight:
                        type: number
                      level:
                        type: integer
      responses:
        '200':
          description: 创建成功

  /api/job/ability/tree/{job_id}:
    get:
      summary: 获取岗位能力树
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 获取成功

  /api/job/ability/update/{node_id}:
    put:
      summary: 更新岗位能力节点
      security:
        - bearerAuth: []
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 更新成功

  /api/job/ability/delete/{job_id}:
    delete:
      summary: 删除岗位能力图谱
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功

  /api/match:
    post:
      summary: 简历岗位匹配
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resume_id:
                  type: integer
                  description: 简历ID
                job_id:
                  type: integer
                  description: 岗位ID
      responses:
        '200':
          description: 匹配成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  match_id:
                    type: integer
                  score:
                    type: number
                    description: 匹配分数
                  details:
                    type: object
                    description: 匹配详情

  /api/match/records:
    get:
      summary: 获取匹配记录列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    resume_id:
                      type: integer
                    job_id:
                      type: integer
                    score:
                      type: number
                    status:
                      type: string
                    created_at:
                      type: string
                      format: date-time

  /api/match/recommendations:
    get:
      summary: 获取推荐岗位/简历
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功

  /api/match/{match_id}:
    get:
      summary: 获取匹配详情
      security:
        - bearerAuth: []
      parameters:
        - name: match_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 获取成功
        '404':
          description: 匹配记录不存在

  /api/admin/users:
    get:
      summary: 获取用户列表（管理员）
      security:
        - bearerAuth: []
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        phone:
                          type: string
                        roles:
                          type: array
                          items:
                            type: string
                        created_at:
                          type: string
                          format: date-time

  /api/admin/users/{user_id}:
    get:
      summary: 获取用户详情（管理员）
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
        '404':
          description: 用户不存在

    delete:
      summary: 删除用户（管理员）
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
        '404':
          description: 用户不存在

  /api/admin/users/{user_id}/roles:
    put:
      summary: 更新用户角色（管理员）
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 更新成功

  /api/admin/users/{user_id}/promote:
    post:
      summary: 提升为管理员
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 提升成功

  /api/admin/stats:
    get:
      summary: 获取系统统计（管理员）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_users:
                    type: integer
                  total_resumes:
                    type: integer
                  total_jobs:
                    type: integer
                  total_matches:
                    type: integer
                  job_seeker_count:
                    type: integer
                  company_count:
                    type: integer

  /api/admin/health:
    get:
      summary: 管理员服务健康检查
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /api/ability:
    get:
      summary: AI模块状态
      responses:
        '200':
          description: 获取成功

  /api/ability/tree/{user_id}:
    get:
      summary: 获取用户能力树
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: resume_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 获取成功

  /api/ability/radar/{user_id}:
    get:
      summary: 获取能力雷达图数据
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: resume_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 获取成功

  /api/ability/create:
    post:
      summary: 创建能力图谱
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                ability_data:
                  type: object
      responses:
        '200':
          description: 创建成功

  /api/ability/update/{node_id}:
    put:
      summary: 更新能力节点
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 更新成功

  /api/ability/delete/{user_id}:
    delete:
      summary: 删除能力图谱
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功

  /api/ability/text/{user_id}:
    get:
      summary: 获取能力文本分析
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: resume_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 获取成功

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
