<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能匹配系统核心流程</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #1e88e5;
            margin-bottom: 20px;
            font-size: 28px;
            text-align: center;
            font-weight: 600;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 920px;
            width: 100%;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 8px;
            color: #1565c0;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>智能匹配系统核心流程</h1>
    <div class="container">
        <svg xmlns="http://www.w3.org/2000/svg" width="880" height="750" viewBox="0 0 880 750">
            <defs>
                <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#42a5f5;stop-opacity:1" />
                </linearGradient>
            </defs>
            
            <rect width="880" height="680" fill="#ffffff"/>
            
            <!-- 标题 -->
            <text x="440" y="45" text-anchor="middle" font-size="26" font-weight="600" fill="url(#titleGradient)" font-family="Microsoft YaHei, Arial, sans-serif">智能匹配系统核心流程</text>
            
            <!-- 第一层：输入处理 -->
            <rect x="60" y="85" width="180" height="70" rx="8" ry="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
            <text x="150" y="115" text-anchor="middle" font-size="15" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif">简历/岗位输入</text>
            <text x="150" y="138" text-anchor="middle" font-size="11" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif">PDF/DOC/文本</text>
            
            <polygon points="240,120 258,120 252,113 252,127" fill="#42a5f5"/>
            
            <rect x="275" y="85" width="140" height="70" rx="8" ry="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
            <text x="345" y="115" text-anchor="middle" font-size="13" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif">行业智能识别</text>
            <text x="345" y="138" text-anchor="middle" font-size="10" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif">关键词匹配</text>
            
            <polygon points="415,120 433,120 427,113 427,127" fill="#42a5f5"/>
            
            <rect x="455" y="85" width="180" height="70" rx="8" ry="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
            <text x="545" y="115" text-anchor="middle" font-size="15" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif">加载行业模板</text>
            <text x="545" y="138" text-anchor="middle" font-size="11" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif">六大行业差异化权重</text>
            
            <polygon points="635,120 653,120 647,113 647,127" fill="#42a5f5"/>
            
            <rect x="675" y="85" width="140" height="70" rx="8" ry="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
            <text x="745" y="115" text-anchor="middle" font-size="13" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif">AI智能解析</text>
            <text x="745" y="138" text-anchor="middle" font-size="10" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif">技能/经验提取</text>
            
            <!-- 分隔线 -->
            <line x1="40" y="180" x2="840" y="180" stroke="#f0f0f0" stroke-width="1"/>
            
            <!-- 第二层：行业模板 -->
            <text x="440" y="205" text-anchor="middle" font-size="14" font-weight="500" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif">六大行业能力树模板</text>
            
            <rect x="40" y="225" width="115" height="55" rx="6" ry="6" fill="#ffffff" stroke="#e1bee7" stroke-width="1.5"/>
            <text x="97" y="247" text-anchor="middle" font-size="11" fill="#7b1fa2" font-family="Microsoft YaHei, Arial, sans-serif">互联网/科技</text>
            <text x="97" y="267" text-anchor="middle" font-size="9" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif">技能40% | 项目25%</text>
            
            <rect x="165" y="225" width="115" height="55" rx="6" ry="6" fill="#ffffff" stroke="#f8bbd9" stroke-width="1.5"/>
            <text x="222" y="247" text-anchor="middle" font-size="11" fill="#c2185b" font-family="Microsoft YaHei, Arial, sans-serif">金融/投资</text>
            <text x="222" y="267" text-anchor="middle" font-size="9" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif">资质30% | 分析30%</text>
            
            <rect x="290" y="225" width="115" height="55" rx="6" ry="6" fill="#ffffff" stroke="#ffe082" stroke-width="1.5"/>
            <text x="347" y="247" text-anchor="middle" font-size="11" fill="#f57c00" font-family="Microsoft YaHei, Arial, sans-serif">教育/培训</text>
            <text x="347" y="267" text-anchor="middle" font-size="9" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif">教学35% | 成果25%</text>
            
            <rect x="415" y="225" width="115" height="55" rx="6" ry="6" fill="#ffffff" stroke="#a5d6a7" stroke-width="1.5"/>
            <text x="472" y="247" text-anchor="middle" font-size="11" fill="#2e7d32" font-family="Microsoft YaHei, Arial, sans-serif">医疗/健康</text>
            <text x="472" y="267" text-anchor="middle" font-size="9" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif">资质35% | 临床25%</text>
            
            <rect x="540" y="225" width="115" height="55" rx="6" ry="6" fill="#ffffff" stroke="#ffab91" stroke-width="1.5"/>
            <text x="597" y="247" text-anchor="middle" font-size="11" fill="#e64a19" font-family="Microsoft YaHei, Arial, sans-serif">制造/工程</text>
            <text x="597" y="267" text-anchor="middle" font-size="9" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif">技能35% | 项目25%</text>
            
            <rect x="665" y="225" width="115" height="55" rx="6" ry="6" fill="#ffffff" stroke="#90caf9" stroke-width="1.5"/>
            <text x="722" y="247" text-anchor="middle" font-size="11" fill="#1565c0" font-family="Microsoft YaHei, Arial, sans-serif">销售/市场</text>
            <text x="722" y="267" text-anchor="middle" font-size="9" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif">销售30% | 业绩30%</text>
            
            <!-- 分隔线 -->
            <line x1="40" y="300" x2="840" y="300" stroke="#f0f0f0" stroke-width="1"/>
            
            <!-- 第三层：双引擎匹配 -->
            <rect x="280" y="320" width="320" height="110" rx="10" ry="10" fill="#ffffff" stroke="#42a5f5" stroke-width="2"/>
            <text x="440" y="350" text-anchor="middle" font-size="17" font-weight="600" fill="#1976d2" font-family="Microsoft YaHei, Arial, sans-serif">双引擎匹配计算</text>
            
            <rect x="310" y="370" width="120" height="45" rx="5" ry="5" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
            <text x="370" y="387" text-anchor="middle" font-size="12" font-weight="500" fill="#2e7d32" font-family="Microsoft YaHei, Arial, sans-serif">语义匹配 70%</text>
            <text x="370" y="405" text-anchor="middle" font-size="9" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif">Transformer架构</text>
            
            <rect x="450" y="370" width="120" height="45" rx="5" ry="5" fill="#fff8e1" stroke="#ffb74d" stroke-width="1"/>
            <text x="510" y="387" text-anchor="middle" font-size="12" font-weight="500" fill="#f57c00" font-family="Microsoft YaHei, Arial, sans-serif">规则匹配 30%</text>
            <text x="510" y="405" text-anchor="middle" font-size="9" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif">城市/薪资筛选</text>
            
            <!-- 箭头 -->
            <polygon points="440,430 450,430 445,442 435,442" fill="#42a5f5"/>
            <line x1="440" y="430" x2="440" y="460" stroke="#42a5f5" stroke-width="2"/>
            
            <!-- 第四层：评分调整 -->
            <rect x="340" y="470" width="200" height="70" rx="8" ry="8" fill="#ffffff" stroke="#90caf9" stroke-width="1.5"/>
            <text x="440" y="498" text-anchor="middle" font-size="14" fill="#1565c0" font-family="Microsoft YaHei, Arial, sans-serif">评分调整</text>
            <text x="440" y="520" text-anchor="middle" font-size="11" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif">证书加分(自定义) | 学历惩罚(自定义)</text>
            
            <polygon points="440,540 450,540 445,552 435,552" fill="#42a5f5"/>
            <line x1="440" y="540" x2="440" y="570" stroke="#42a5f5" stroke-width="2"/>
            
            <!-- 第五层：输出 -->
            <rect x="300" y="580" width="280" height="60" rx="10" ry="10" fill="#42a5f5" stroke="#42a5f5" stroke-width="1"/>
            <text x="440" y="610" text-anchor="middle" font-size="16" fill="#ffffff" font-family="Microsoft YaHei, Arial, sans-serif">匹配报告生成</text>
            <text x="440" y="632" text-anchor="middle" font-size="11" fill="#e3f2fd" font-family="Microsoft YaHei, Arial, sans-serif">优势分析 · 差距定位 · 职业建议</text>
            
            <!-- 底部公式和图例 -->
            <rect x="60" y="660" width="160" height="65" rx="6" ry="6" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
            <text x="140" y="678" text-anchor="middle" font-size="11" font-weight="500" fill="#f57c00" font-family="Microsoft YaHei, Arial, sans-serif">匹配度公式</text>
            <text x="140" y="696" text-anchor="middle" font-size="10" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif">语义(70%) + 规则(30%)</text>
            <text x="140" y="712" text-anchor="middle" font-size="10" fill="#f57c00" font-family="Microsoft YaHei, Arial, sans-serif">+证书加分 - 学历惩罚</text>
        </svg>
    </div>
    <div class="info">
        <strong>图表说明：</strong>本图表展示了智能匹配系统的核心业务流程。系统支持自定义证书加分规则和学历惩罚规则，学历惩罚可设为任意百分比（包括100%）。
    </div>
</body>
</html>
